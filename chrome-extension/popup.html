<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f14;
      color: #e4e4e7;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #27272a;
    }
    .header .logo {
      width: 32px; height: 32px;
      background: hsla(168, 80%, 42%, 0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: #fff;
      text-shadow: 0 0 8px hsla(168, 80%, 42%, 0.8);
      border: 1px solid hsla(168, 80%, 42%, 0.4);
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header .version { font-size: 11px; color: #71717a; margin-left: auto; }

    .content { padding: 16px; }

    /* Login form */
    .login-section label {
      display: block; font-size: 12px; font-weight: 500;
      color: #a1a1aa; margin-bottom: 4px;
    }
    .login-section input {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #27272a; background: #18181b;
      color: #e4e4e7; font-size: 13px; margin-bottom: 10px;
      outline: none;
    }
    .login-section input:focus { border-color: #8b5cf6; }

    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #8b5cf6; color: #fff;
    }
    .btn-primary:hover { background: #7c3aed; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-fill {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: #fff; font-size: 14px; padding: 12px;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
    }
    .btn-fill:hover { box-shadow: 0 0 30px rgba(139, 92, 246, 0.5); }

    .btn-outline {
      background: transparent; border: 1px solid #27272a;
      color: #a1a1aa;
    }
    .btn-outline:hover { background: #18181b; color: #e4e4e7; }

    .user-section { text-align: center; }
    .user-email {
      font-size: 12px; color: #a1a1aa; margin-bottom: 14px;
      word-break: break-all;
    }
    .user-name {
      font-size: 15px; font-weight: 600; margin-bottom: 2px;
    }

    .status {
      margin-top: 12px; padding: 8px 10px; border-radius: 6px;
      font-size: 12px; text-align: center; display: none;
    }
    .status.success { display: block; background: rgba(34,197,94,0.15); color: #4ade80; }
    .status.error { display: block; background: rgba(239,68,68,0.15); color: #f87171; }
    .status.info { display: block; background: rgba(139,92,246,0.15); color: #a78bfa; }

    .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

    .footer {
      padding: 12px 16px; border-top: 1px solid #27272a;
      text-align: center; font-size: 11px; color: #52525b;
    }
    .footer a { color: #8b5cf6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <h1>FillZapp</h1>
    <span class="version">v1.0</span>
  </div>

  <!-- Login view -->
  <div class="content" id="loginView">
    <div class="login-section">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" />
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
      <button class="btn btn-primary" id="loginBtn">Sign In</button>
      <div class="status" id="loginStatus"></div>
    </div>
  </div>

  <!-- Logged-in view -->
  <div class="content" id="mainView" style="display:none">
    <div class="user-section">
      <div class="user-name" id="userName"></div>
      <div class="user-email" id="userEmail"></div>
    </div>
    <div class="actions">
      <button class="btn btn-fill" id="fillBtn">⚡ Auto-Fill This Page</button>
      <button class="btn btn-outline" id="logoutBtn">Sign Out</button>
    </div>
    <div class="status" id="fillStatus"></div>
  </div>

  <div class="footer">
    <a href="https://fillzapp.com" target="_blank">fillzapp.com</a> · Manage your profile on the dashboard
  </div>

  <script src="popup.js"></script>
</body>
</html>
