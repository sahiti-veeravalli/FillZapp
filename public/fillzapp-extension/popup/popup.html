<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FillZapp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f23;
      color: #e2e8f0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .header .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 800;
    }
    .header h1 span { color: #14b8a6; }
    .status {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      text-align: center;
    }
    .status.connected {
      background: rgba(20, 184, 166, 0.1);
      border: 1px solid rgba(20, 184, 166, 0.2);
      color: #14b8a6;
    }
    .status.disconnected {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .toggle-row span { font-size: 13px; }
    .toggle {
      width: 40px; height: 22px;
      background: #334155;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #14b8a6; }
    .toggle::after {
      content: "";
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(18px); }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      color: #fff;
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(20, 184, 166, 0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #94a3b8;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
    .field-count {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
    }
    .field-count strong { color: #14b8a6; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <h1>Fill<span>Zapp</span></h1>
  </div>

  <div id="status" class="status disconnected">Not connected</div>

  <div class="section">
    <div class="section-title">Settings</div>
    <div class="toggle-row">
      <span>Auto-fill enabled</span>
      <div id="toggle-autofill" class="toggle active"></div>
    </div>
    <div class="toggle-row">
      <span>Confirm before fill</span>
      <div id="toggle-confirm" class="toggle active"></div>
    </div>
  </div>

  <button id="sync-btn" class="btn btn-primary">⚡ Sync Profile Data</button>
  <button id="dashboard-btn" class="btn btn-secondary">Open Dashboard</button>

  <div id="field-count" class="field-count"></div>

  <script src="popup.js"></script>
</body>
</html>
